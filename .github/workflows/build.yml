name: Godot Build & Export

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  GODOT_VERSION: "4.3"
  GODOT_RELEASE: "stable"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [android, windows, linux]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Godot Editor
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip -O godot.zip
          unzip godot.zip
          chmod +x Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64
          mv Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64 godot_editor
          ls -la godot_editor

      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz -O templates.tpz
          unzip templates.tpz
          cp -r templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/
          ls ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Setup Android SDK & Debug Keystore
        if: matrix.target == 'android'
        run: |
          # Install Android SDK
          sudo apt-get update
          sudo apt-get install -y android-sdk-platform-tools

          # Install Android SDK components via command line tools
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip cmdtools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest

          # Accept licenses and install required components
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

          # Generate debug keystore
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999 -destkeystore debug.keystore
          ls -la debug.keystore

      - name: Import Godot Project
        run: |
          ./godot_editor --headless --import

      - name: Build for Android
        if: matrix.target == 'android'
        run: |
          mkdir -p ./build
          # Update export_presets.cfg with debug keystore path
          sed -i 's|keystore/debug=""|keystore/debug="../debug.keystore"|g' export_presets.cfg
          sed -i 's|keystore/debug_user=""|keystore/debug_user="androiddebugkey"|g' export_presets.cfg
          sed -i 's|keystore/debug_password=""|keystore/debug_password="android"|g' export_presets.cfg
          ./godot_editor --headless --export-debug "Android" ./build/TheGhost.apk
          ls -la ./build/

      - name: Build for Windows
        if: matrix.target == 'windows'
        run: |
          mkdir -p ./build
          ./godot_editor --headless --export-debug "Windows Desktop" ./build/TheGhost_Windows.exe

      - name: Build for Linux
        if: matrix.target == 'linux'
        run: |
          mkdir -p ./build
          ./godot_editor --headless --export-debug "Linux/X11" ./build/TheGhost_Linux.x86_64

      - name: Rename files to avoid conflicts
        if: matrix.target != 'android'
        run: |
          cd ./build
          for f in *.pck *.console.* *.sh; do
            if [ -f "$f" ]; then
              if [ "${{ matrix.target }}" = "windows" ]; then
                mv "$f" "${f%.pck}_Windows.pck" 2>/dev/null || mv "$f" "Windows_$f" 2>/dev/null || true
              else
                mv "$f" "${f%.pck}_Linux.pck" 2>/dev/null || mv "$f" "Linux_$f" 2>/dev/null || true
              fi
            fi
          done
          ls -la

      - name: Zip build output
        run: |
          cd ./build
          zip -r ../the-ghost-${{ matrix.target }}.zip .
          ls -la ..

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: the-ghost-${{ matrix.target }}
          path: ./the-ghost-${{ matrix.target }}.zip
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: find ./artifacts -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v0.1.${{ github.run_number }}
          name: "The Ghost - Build #${{ github.run_number }}"
          files: ./artifacts/**/*.zip
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
